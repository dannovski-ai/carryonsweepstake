<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>endpointX · Sweepstake 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0b1e;
      --surface:   #1a1535;
      --surface2:  #231d45;
      --accent:    #ff6b35;
      --accent2:   #e84012;
      --gold:      #ffd700;
      --teal:      #00d4aa;
      --text:      #f0ecff;
      --muted:     #9b93c4;
      --elim:      #4a4060;
      --radius:    16px;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      background: linear-gradient(160deg, #0d0a1f 0%, #1a0f2e 50%, #0f1a2e 100%) fixed;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Page header (branding, sits at top of scroll) ───────────────────── */
    .page-header {
      padding: calc(var(--safe-top) + 28px) 20px 20px;
      max-width: 540px;
      margin: 0 auto;
    }
    .hero-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 8vw, 46px);
      font-weight: 900;
      line-height: 1.05;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    }
    .hero-title span { color: var(--accent); font-style: italic; }
    .hero-sub {
      font-size: 13px;
      color: rgba(240,236,255,0.65);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ── Layout ───────────────────────────────────────────────────────────── */
    .container {
      max-width: 540px;
      margin: 0 auto;
      padding: 0 16px calc(var(--safe-bottom) + 40px);
    }

    /* ── Section headings ─────────────────────────────────────────────────── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 24px 0 12px;
    }
    .section-head h2 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .section-head .badge {
      background: rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 10px;
      letter-spacing: 0.5px;
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: rgba(18, 14, 40, 0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 18px;
      margin-bottom: 12px;
    }

    /* ── Join form ────────────────────────────────────────────────────────── */
    .join-card {
      background: rgba(18, 14, 40, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,107,53,0.35);
    }
    .join-card label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .join-card input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 17px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .join-card input::placeholder { color: var(--muted); }
    .join-card input:focus { border-color: var(--accent); }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.3px;
      -webkit-appearance: none;
    }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      margin-top: 12px;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      margin-top: 10px;
    }
    .btn-danger {
      background: rgba(220,50,50,0.2);
      color: #ff7070;
      border: 1px solid rgba(220,50,50,0.3);
      margin-top: 10px;
    }
    .btn-teal {
      background: var(--teal);
      color: #0f0b1e;
      margin-top: 12px;
    }

    /* ── Joined banner ────────────────────────────────────────────────────── */
    .joined-banner {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .joined-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .joined-name { font-size: 17px; font-weight: 600; }
    .joined-status { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* ── Player list (pre-draw) ───────────────────────────────────────────── */
    .player-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .player-row:last-child { border-bottom: none; padding-bottom: 0; }
    .player-row:first-child { padding-top: 0; }
    .player-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .player-name-text { font-size: 15px; font-weight: 500; }
    .player-you {
      font-size: 11px;
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 2px 6px;
      font-weight: 600;
      margin-left: auto;
    }

    /* ── Your teams hero card ─────────────────────────────────────────────── */
    .your-teams-card {
      background: rgba(18, 14, 40, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,107,53,0.4);
    }
    .your-teams-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .team-chips {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .team-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 14px 16px;
      transition: background 0.2s;
    }
    .team-chip.eliminated {
      background: rgba(255,255,255,0.02);
      opacity: 0.45;
    }
    .team-chip .flag { font-size: 26px; line-height: 1; }
    .team-chip .tname {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }
    .team-chip.eliminated .tname {
      text-decoration: line-through;
      text-decoration-color: rgba(255,255,255,0.5);
    }
    .chip-out {
      font-size: 11px;
      font-weight: 600;
      color: #ff7070;
      letter-spacing: 0.5px;
      background: rgba(220,50,50,0.15);
      border-radius: 6px;
      padding: 3px 8px;
    }
    .chip-alive {
      font-size: 11px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: 0.5px;
      background: rgba(0,212,170,0.1);
      border-radius: 6px;
      padding: 3px 8px;
    }

    /* ── All players grid (post-draw) ─────────────────────────────────────── */
    .player-card {
      background: rgba(18, 14, 40, 0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 16px;
      margin-bottom: 10px;
    }
    .player-card.is-you {
      border-color: rgba(255,107,53,0.45);
      background: rgba(30, 18, 50, 0.85);
    }
    .player-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .player-card-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }
    .player-card.is-you .player-card-avatar { background: var(--accent); }
    .player-card-name { font-size: 15px; font-weight: 600; flex: 1; }
    .player-card-status {
      font-size: 11px; font-weight: 600;
      border-radius: 6px; padding: 3px 8px;
    }
    .status-alive { background: rgba(0,212,170,0.15); color: var(--teal); }
    .status-out { background: rgba(220,50,50,0.15); color: #ff7070; }
    .player-card-teams {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .mini-team {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      font-size: 13px;
      font-weight: 500;
    }
    .mini-team.eliminated {
      opacity: 0.4;
      text-decoration: line-through;
    }
    .mini-team .flag { font-size: 18px; }

    /* ── Winner banner ────────────────────────────────────────────────────── */
    .winner-banner {
      background: linear-gradient(135deg, #1a3a1a, #0f2b0f);
      border: 2px solid var(--gold);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 12px;
    }
    .winner-trophy { font-size: 48px; margin-bottom: 8px; }
    .winner-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .winner-name {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 900;
      color: var(--gold);
    }
    .winner-teams {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Admin panel ──────────────────────────────────────────────────────── */
    .admin-panel {
      background: rgba(18, 14, 40, 0.80);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,107,53,0.2);
      border-radius: var(--radius);
      margin-bottom: 12px;
    }
    .admin-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .admin-toggle-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }
    .admin-toggle-icon { color: var(--accent); font-size: 18px; transition: transform 0.2s; }
    .admin-toggle-icon.open { transform: rotate(180deg); }
    .admin-body { padding: 0 18px 18px; display: none; }
    .admin-body.open { display: block; }

    .elim-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }
    .elim-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      -webkit-appearance: none;
    }
    .elim-btn .flag { font-size: 18px; }
    .elim-btn.is-elim {
      background: rgba(220,50,50,0.15);
      border-color: rgba(220,50,50,0.3);
      color: #ff9090;
      text-decoration: line-through;
    }
    .elim-btn:active { transform: scale(0.97); }

    /* ── Status pill ──────────────────────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 20px;
      padding: 5px 12px;
    }
    .pill-waiting { background: rgba(255,215,0,0.1); color: var(--gold); }
    .pill-live { background: rgba(0,212,170,0.1); color: var(--teal); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Toast ────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 20px);
      left: 50%; transform: translateX(-50%);
      background: #2a2045;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
      text-align: center;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── Empty state ──────────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty p { font-size: 14px; line-height: 1.5; }

    /* ── Divider ──────────────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 8px 0;
    }

    /* ── Footnote ─────────────────────────────────────────────────────────── */
    .footnote {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin: 20px 0 8px;
      letter-spacing: 0.5px;
    }
    .footnote span { color: var(--accent); }
  </style>
</head>
<body>

<!-- ── Page header (branding) ────────────────────────────────────────────── -->
<div class="page-header">
  <div class="hero-label">endpoint<span style="color:#ff6b35">X</span></div>
  <div class="hero-title">World Cup <span>2026</span></div>
  <div class="hero-sub">sweepstake · 48 teams · 3 per player</div>
</div>

<!-- ── Main content ───────────────────────────────────────────────────────── -->
<div class="container">
  <div id="app"><!-- rendered by JS --></div>
  <div class="footnote">endpoint<span>X</span> · world cup 2026</div>
</div>

<div id="toast"></div>

<script>
// ── Flags ──────────────────────────────────────────────────────────────────
const FLAGS = {
  'Argentina':'🇦🇷','Brazil':'🇧🇷','Colombia':'🇨🇴','Ecuador':'🇪🇨',
  'Uruguay':'🇺🇾','Venezuela':'🇻🇪','Bolivia':'🇧🇴','Paraguay':'🇵🇾',
  'Germany':'🇩🇪','Spain':'🇪🇸','France':'🇫🇷','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿',
  'Portugal':'🇵🇹','Netherlands':'🇳🇱','Belgium':'🇧🇪','Italy':'🇮🇹',
  'Switzerland':'🇨🇭','Austria':'🇦🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Denmark':'🇩🇰',
  'Serbia':'🇷🇸','Czechia':'🇨🇿','Croatia':'🇭🇷','Hungary':'🇭🇺',
  'Poland':'🇵🇱','Slovakia':'🇸🇰','Romania':'🇷🇴','Slovenia':'🇸🇮',
  'Albania':'🇦🇱','Turkey':'🇹🇷','Ukraine':'🇺🇦','Georgia':'🇬🇪',
  'USA':'🇺🇸','Mexico':'🇲🇽','Canada':'🇨🇦','Jamaica':'🇯🇲',
  'Panama':'🇵🇦','Honduras':'🇭🇳','Costa Rica':'🇨🇷',
  'Japan':'🇯🇵','South Korea':'🇰🇷','Australia':'🇦🇺','Iran':'🇮🇷',
  'Saudi Arabia':'🇸🇦','Iraq':'🇮🇶',
  'Morocco':'🇲🇦','Egypt':'🇪🇬','Senegal':'🇸🇳','Nigeria':'🇳🇬',
  'New Zealand':'🇳🇿',
};

function flag(team) { return FLAGS[team] || '🏳️'; }

// ── State ──────────────────────────────────────────────────────────────────
let state = { players:[], assignments:{}, drawn:false, eliminated:[] };
let currentPlayer = sessionStorage.getItem('sweepstake_player') || '';
let adminOpen = false;

// ── Socket ─────────────────────────────────────────────────────────────────
const socket = io();
socket.on('state', (s) => { state = s; render(); });
socket.on('state_update', (s) => { state = s; render(); });
socket.on('error_msg', (msg) => toast(msg));

// ── Toast ──────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Helpers ────────────────────────────────────────────────────────────────
const isDan = () => currentPlayer.trim().toLowerCase() === 'dan';
const isElim = (team) => state.eliminated.includes(team);

function playerSurviving(player) {
  const teams = state.assignments[player] || [];
  return teams.some(t => !isElim(t));
}

function computeWinner() {
  if (!state.drawn || state.players.length === 0) return null;
  const alive = state.players.filter(p => playerSurviving(p));
  if (alive.length === 1) return alive[0];
  return null;
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

// ── Main render ────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  let html = '';

  const winner = computeWinner();

  // Winner banner
  if (winner) {
    const wteams = state.assignments[winner] || [];
    html += `
      <div class="winner-banner">
        <div class="winner-trophy">🏆</div>
        <div class="winner-label">Winner!</div>
        <div class="winner-name">${esc(winner)}</div>
        <div class="winner-teams">${wteams.map(t => flag(t)+' '+t).join(' · ')}</div>
      </div>`;
  }

  // Status pill
  const pill = state.drawn
    ? `<span class="status-pill pill-live"><span class="dot"></span> Draw complete · ${state.players.length} players</span>`
    : `<span class="status-pill pill-waiting"><span class="dot"></span> Waiting for draw · ${state.players.length} joined</span>`;
  html += `<div class="status-bar" style="margin-top:20px">${pill}</div>`;

  // ── Pre-draw flow ──────────────────────────────────────────────────────
  if (!state.drawn) {
    // Join card
    if (!currentPlayer) {
      html += `
        <div class="section-head"><h2>Join the Sweepstake</h2></div>
        <div class="card join-card">
          <label>Your name</label>
          <input id="nameInput" type="text" placeholder="Enter your name…" autocomplete="off"
            autocapitalize="words" maxlength="30" inputmode="text">
          <button class="btn btn-primary" onclick="doJoin()">Join Now</button>
        </div>`;
    } else {
      html += `
        <div class="section-head"><h2>You're In!</h2></div>
        <div class="card join-card">
          <div class="joined-banner">
            <div class="joined-avatar">${initials(currentPlayer)}</div>
            <div>
              <div class="joined-name">${esc(currentPlayer)}</div>
              <div class="joined-status">Waiting for the draw…</div>
            </div>
          </div>
        </div>`;
    }

    // Players list
    html += `<div class="section-head"><h2>Players</h2><span class="badge">${state.players.length}</span></div>`;
    if (state.players.length === 0) {
      html += `<div class="card"><div class="empty"><div class="empty-icon">👥</div><p>No one has joined yet.<br>Be the first!</p></div></div>`;
    } else {
      html += `<div class="card">`;
      state.players.forEach((p, i) => {
        const isYou = p.toLowerCase() === currentPlayer.toLowerCase();
        html += `
          <div class="player-row">
            <span class="player-num">${i+1}</span>
            <span class="player-name-text">${esc(p)}</span>
            ${isYou ? '<span class="player-you">You</span>' : ''}
          </div>`;
      });
      html += `</div>`;
    }

    // Dan's draw button
    if (isDan() && state.players.length >= 2) {
      html += `
        <button class="btn btn-teal" onclick="doDraw()" style="margin-top:8px">
          🎲 Draw Teams (${state.players.length} players)
        </button>`;
    } else if (isDan() && state.players.length < 2) {
      html += `<div style="text-align:center;color:var(--muted);font-size:13px;margin-top:12px">Need at least 2 players to draw</div>`;
    }

  } else {
    // ── Post-draw flow ───────────────────────────────────────────────────

    // Your teams card (if you're a registered player)
    const myTeams = currentPlayer ? state.assignments[currentPlayer] : null;
    if (myTeams && myTeams.length) {
      html += `
        <div class="section-head"><h2>Your Teams</h2></div>
        <div class="card your-teams-card">
          <div class="your-teams-label">✦ ${esc(currentPlayer)}'s teams</div>
          <div class="team-chips">`;
      myTeams.forEach(team => {
        const out = isElim(team);
        html += `
            <div class="team-chip ${out ? 'eliminated' : ''}">
              <span class="flag">${flag(team)}</span>
              <span class="tname">${esc(team)}</span>
              ${out ? '<span class="chip-out">OUT</span>' : '<span class="chip-alive">IN</span>'}
            </div>`;
      });
      html += `</div></div>`;
    } else if (currentPlayer && !state.players.includes(currentPlayer)) {
      // Player not in list — maybe joined after draw
      html += `
        <div class="card" style="margin-top:20px;text-align:center;color:var(--muted)">
          <div class="empty-icon">😔</div>
          <p style="font-size:14px">You joined after the draw was made.<br>You weren't assigned any teams this time.</p>
        </div>`;
    } else if (!currentPlayer) {
      // Not registered at all
      html += `
        <div class="section-head"><h2>View the Draw</h2></div>
        <div class="card join-card">
          <label>Enter your name to see your teams</label>
          <input id="nameInput" type="text" placeholder="Your name…" autocomplete="off"
            autocapitalize="words" maxlength="30">
          <button class="btn btn-primary" onclick="doViewOnly()">View My Teams</button>
        </div>`;
    }

    // All players
    html += `<div class="section-head"><h2>All Players</h2><span class="badge">${state.players.length}</span></div>`;
    state.players.forEach(player => {
      const teams = state.assignments[player] || [];
      const isYou = player.toLowerCase() === currentPlayer.toLowerCase();
      const surviving = teams.filter(t => !isElim(t));
      const alive = surviving.length > 0;
      html += `
        <div class="player-card ${isYou ? 'is-you' : ''}">
          <div class="player-card-header">
            <div class="player-card-avatar">${initials(player)}</div>
            <div class="player-card-name">${esc(player)}${isYou ? ' <span style="font-size:11px;color:var(--accent)">(you)</span>' : ''}</div>
            <span class="player-card-status ${alive ? 'status-alive' : 'status-out'}">${alive ? surviving.length+' alive' : 'OUT'}</span>
          </div>
          <div class="player-card-teams">`;
      teams.forEach(team => {
        const out = isElim(team);
        html += `
            <div class="mini-team ${out ? 'eliminated' : ''}">
              <span class="flag">${flag(team)}</span>
              <span>${esc(team)}</span>
              ${out ? '<span style="color:#ff7070;font-size:11px;margin-left:auto">OUT</span>' : ''}
            </div>`;
      });
      html += `</div></div>`;
    });

    // ── Admin panel (Dan only) ─────────────────────────────────────────────
    if (isDan()) {
      const allDrawnTeams = Object.values(state.assignments).flat();
      html += `
        <div class="admin-panel">
          <div class="admin-toggle" onclick="toggleAdmin()">
            <span class="admin-toggle-label">⚙️ Admin Controls</span>
            <span class="admin-toggle-icon ${adminOpen ? 'open' : ''}">▼</span>
          </div>
          <div class="admin-body ${adminOpen ? 'open' : ''}">
            <p style="font-size:13px;color:var(--muted);margin-bottom:14px">
              Tap a team to mark them eliminated. Tap again to reinstate.
            </p>
            <div class="elim-grid">`;
      allDrawnTeams.forEach(team => {
        const out = isElim(team);
        html += `
              <button class="elim-btn ${out ? 'is-elim' : ''}" onclick="toggleElim('${esc(team)}')">
                <span class="flag">${flag(team)}</span>
                <span>${esc(team)}</span>
              </button>`;
      });
      html += `</div>
            <div class="divider" style="margin-top:16px"></div>
            <button class="btn btn-danger" onclick="doReset()" style="margin-top:12px">
              🔄 Reset Draw (keep players)
            </button>
            <button class="btn btn-danger" onclick="doFullReset()" style="margin-top:8px">
              🗑️ Full Reset (players + draw)
            </button>
          </div>
        </div>`;
    }
  }

  app.innerHTML = html;

  // Bind Enter on name input
  const ni = document.getElementById('nameInput');
  if (ni) {
    ni.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (state.drawn) doViewOnly();
        else doJoin();
      }
    });
    // Auto-focus only on desktop (avoid keyboard popup on mobile)
    if (window.innerWidth > 600) ni.focus();
  }
}

// ── Actions ────────────────────────────────────────────────────────────────
function doJoin() {
  const ni = document.getElementById('nameInput');
  const name = (ni ? ni.value : '').trim();
  if (!name) { toast('Please enter your name'); return; }
  currentPlayer = name;
  sessionStorage.setItem('sweepstake_player', name);
  socket.emit('join_player', name);
}

function doViewOnly() {
  const ni = document.getElementById('nameInput');
  const name = (ni ? ni.value : '').trim();
  if (!name) { toast('Please enter your name'); return; }
  currentPlayer = name;
  sessionStorage.setItem('sweepstake_player', name);
  render();
}

function doDraw() {
  if (!confirm('Ready to draw teams? This will assign 3 random teams to each player.')) return;
  socket.emit('draw_sweepstake', currentPlayer);
}

function toggleElim(team) {
  socket.emit('toggle_eliminated', { team, requester: currentPlayer });
}

function doReset() {
  if (!confirm('Reset the draw? Players will be kept but teams will be re-drawn.')) return;
  socket.emit('reset_draw', currentPlayer);
}

function doFullReset() {
  if (!confirm('Full reset? This will remove all players and the draw. Are you sure?')) return;
  socket.emit('full_reset', currentPlayer);
}

function toggleAdmin() {
  adminOpen = !adminOpen;
  render();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
