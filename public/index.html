<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ Carry On Life World Cup 2026 Sweepstake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== PITCH BACKGROUND ===== */
    body {
      font-family: 'Barlow Condensed', sans-serif;
      background-color: #0a1f0e;
      background-image:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.018) 0px,
          rgba(255,255,255,0.018) 60px,
          transparent 60px,
          transparent 120px
        ),
        radial-gradient(ellipse at 50% 0%, rgba(22,80,35,0.6) 0%, transparent 65%);
      min-height: 100vh;
      padding: 0 0 60px;
      color: #1a1a1a;
    }

    .page { max-width: 1440px; margin: 0 auto; padding: 0 16px; }

    /* ===== HEADER ===== */
    .stadium-header {
      background: linear-gradient(180deg, #050e07 0%, #0d2414 60%, #0a1f0e 100%);
      border-bottom: 3px solid #2a6e38;
      padding: 32px 20px 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stadium-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(255,215,0,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 0%, rgba(255,215,0,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 40%);
      pointer-events: none;
    }

    .header-inner { position: relative; z-index: 1; }

    .tournament-tag {
      display: inline-block;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #2a9e50;
      background: rgba(42,110,56,0.18);
      border: 1px solid rgba(42,110,56,0.4);
      padding: 5px 14px;
      border-radius: 2px;
      margin-bottom: 14px;
    }

    .title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.6rem, 8vw, 7rem);
      color: #FFD700;
      letter-spacing: 4px;
      line-height: 0.92;
      text-shadow: 0 0 40px rgba(255,215,0,0.25), 3px 3px 0 rgba(0,0,0,0.5);
      margin-bottom: 6px;
    }

    .title-sub {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.4rem, 4vw, 3rem);
      color: rgba(255,255,255,0.85);
      letter-spacing: 5px;
      margin-bottom: 16px;
    }

    .subtitle {
      font-family: 'Oswald', sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }

    /* ===== CONTROLS STRIP ===== */
    .controls-strip {
      background: #0f2918;
      border-bottom: 2px solid #1d4a27;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stats-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat-pill {
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 2px;
      white-space: nowrap;
    }
    .stat-in    { background: rgba(46,160,67,0.22); color: #5dde80; border: 1.5px solid rgba(46,160,67,0.4); }
    .stat-out   { background: rgba(220,53,69,0.18); color: #ff7b89; border: 1.5px solid rgba(220,53,69,0.35); }
    .stat-teams { background: rgba(255,215,0,0.12); color: #ffd700; border: 1.5px solid rgba(255,215,0,0.28); }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Oswald', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 9px 20px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.18s;
      border: 1.5px solid;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-reset {
      background: rgba(220,53,69,0.15);
      color: #ff7b89;
      border-color: rgba(220,53,69,0.4);
    }
    .btn-reset:hover { background: rgba(220,53,69,0.3); border-color: #ff7b89; }

    .btn-login {
      background: rgba(255,215,0,0.1);
      color: #ffd700;
      border-color: rgba(255,215,0,0.3);
    }
    .btn-login:hover { background: rgba(255,215,0,0.2); border-color: #ffd700; }

    .btn-logout {
      background: transparent;
      color: rgba(255,255,255,0.4);
      border-color: rgba(255,255,255,0.15);
      font-size: 0.78rem;
    }
    .btn-logout:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.35); }

    .admin-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      color: #ffd700;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    /* ===== LOGIN MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #0d2414;
      border: 1.5px solid #2a6e38;
      border-radius: 6px;
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }

    .modal-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      color: #FFD700;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    .modal-sub {
      font-family: 'Oswald', sans-serif;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .modal-field {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      padding: 11px 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      color: #fff;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .modal-field:focus { border-color: #2a9e50; }
    .modal-field::placeholder { color: rgba(255,255,255,0.25); }

    .modal-error {
      font-family: 'Oswald', sans-serif;
      font-size: 0.82rem;
      color: #ff7b89;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      min-height: 20px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-modal-login {
      flex: 1;
      background: #2a6e38;
      color: #fff;
      border-color: #2a9e50;
      font-size: 0.95rem;
    }
    .btn-modal-login:hover { background: #2a9e50; }

    .btn-modal-cancel {
      background: transparent;
      color: rgba(255,255,255,0.45);
      border-color: rgba(255,255,255,0.15);
    }
    .btn-modal-cancel:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

    /* ===== WINNER BANNER ===== */
    .winner-banner {
      display: none;
      padding: 28px 20px;
      background: linear-gradient(135deg, #b8860b 0%, #FFD700 45%, #FFA000 100%);
      border-top: 4px solid #FFD700;
      border-bottom: 4px solid #FFD700;
      text-align: center;
      animation: flashGold 1.5s ease-in-out infinite alternate;
    }

    @keyframes flashGold {
      from { box-shadow: inset 0 0 0 rgba(255,215,0,0), 0 0 30px rgba(255,215,0,0.3); }
      to   { box-shadow: inset 0 0 60px rgba(255,255,255,0.15), 0 0 60px rgba(255,215,0,0.7); }
    }

    .winner-banner h2 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 6vw, 4.5rem);
      color: #1a1a1a;
      letter-spacing: 5px;
    }

    .winner-banner p {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(1rem, 3vw, 1.3rem);
      font-weight: 600;
      color: #3a2000;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* ===== GRID ===== */
    .grid-wrap { padding: 24px 0 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    /* Mobile: single column below 480px */
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .controls-strip { flex-direction: column; align-items: flex-start; }
      .controls-right { width: 100%; justify-content: flex-start; }
    }

    /* ===== PLAYER CARD ===== */
    .card {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.3);
      transition: transform 0.18s ease, opacity 0.4s ease, filter 0.4s ease;
    }
    .card:hover:not(.all-out) { transform: translateY(-3px); }
    .card.all-out { opacity: 0.3; filter: grayscale(1); }

    .card-inner { border-left: 5px solid var(--accent, #2a6e38); }

    .card-header {
      padding: 13px 14px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--header-bg, #f8fdf8);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .player-emoji { font-size: 2.1rem; line-height: 1; flex-shrink: 0; }

    .player-info { flex: 1; min-width: 0; }

    .player-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #111;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-status {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .status-in  { color: #1e7e34; }
    .status-out { color: #b71c1c; }

    /* ===== TEAM BUTTONS ===== */
    .card-teams {
      padding: 9px 11px 12px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .team-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 11px;   /* generous tap target */
      border-radius: 3px;
      background: #f0faf2;
      border: 1.5px solid #b8dfc0;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .team-btn:active { transform: scale(0.98); }

    @media (hover: hover) {
      .team-btn:hover:not(.elim) {
        background: #d4f0db;
        border-color: #4caf5e;
        transform: translateX(5px);
      }
    }

    .team-btn.elim {
      background: #f5f5f5;
      border-color: #ddd;
    }
    .team-btn.elim .team-name { text-decoration: line-through; color: #bbb; }
    .team-btn.elim .flag { opacity: 0.35; }

    /* Live-eliminated: from API, cannot be manually restored */
    .team-btn.live-out {
      background: #fff5f0;
      border-color: #ffccbc;
      cursor: default;
    }
    .team-btn.live-out .team-name { text-decoration: line-through; color: #e57373; }
    .team-btn.live-out .flag { opacity: 0.4; }
    .live-badge {
      font-size: 0.65rem;
      font-weight: 700;
      font-family: 'Oswald', sans-serif;
      letter-spacing: 1px;
      color: #fff;
      background: #e53935;
      padding: 1px 5px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Live data status bar */
    .live-bar {
      background: #071510;
      border-bottom: 1px solid #1a3a22;
      padding: 7px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    .live-dot.active { background: #4caf50; }
    .live-dot.error  { background: #ef5350; animation: none; }
    .live-dot.waiting { background: #888; animation: none; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    .live-bar-text { color: rgba(255,255,255,0.45); }

    .flag { font-size: 1.5rem; line-height: 1; flex-shrink: 0; }

    .team-name {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #1b5e20;
    }

    .elim-icon { font-size: 0.9rem; flex-shrink: 0; }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      margin-top: 50px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }

    /* ===== CONFETTI ===== */
    .confetti-piece {
      position: fixed;
      top: -20px;
      animation: fallDown linear forwards;
      z-index: 9999;
      pointer-events: none;
      border-radius: 2px;
    }
    @keyframes fallDown {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      75%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(900deg); opacity: 0; }
    }
  </style>
</head>

/* ================================================
   SEEDED RANDOM + ASSIGNMENTS
   ================================================ */
function makeRng(seed) {
  let s = seed >>> 0;
  return () => { s = Math.imul(s,1664525)+1013904223|0; return (s>>>0)/4294967296; };
}

function shuffleSeeded(arr, rng) {
  const a = arr.slice();
  for (let i = a.length-1; i>0; i--) { const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

const ASSIGNMENTS = (() => {
  const pool = shuffleSeeded(TEAMS, makeRng(2026));
  return PLAYERS.map((_,i) => [pool[i*2], pool[i*2+1]]);
})();

/* ================================================
   ELIMINATION STATE  (localStorage)
   ================================================ */
const STORE_KEY = 'col_wc2026_v3';
function loadState()  { try { return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); } catch { return {}; } }
function saveState(s) { try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {} }

let eliminated    = loadState();
let confettiFired = false;

const eKey   = (pi,ti) => `${pi}_${ti}`;
const isElim = (pi,ti) => !!eliminated[eKey(pi,ti)];

function toggleTeam(pi, ti) {
  const k = eKey(pi,ti);
  if (eliminated[k]) delete eliminated[k]; else eliminated[k] = true;
  saveState(eliminated);
  render();
}

/* ================================================
   ADMIN AUTH  (sessionStorage — clears on tab close)
   ================================================ */
const ADMIN_USER = 'dan stead';
const ADMIN_PASS = 'CarryOn2026';
const AUTH_KEY   = 'col_admin_session';

function isLoggedIn()  { return sessionStorage.getItem(AUTH_KEY) === '1'; }

function attemptLogin() {
  const user = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const err  = document.getElementById('login-error');

  if (user === ADMIN_USER && pass === ADMIN_PASS) {
    sessionStorage.setItem(AUTH_KEY, '1');
    closeModal();
    render();
  } else {
    err.textContent = 'Incorrect username or password.';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
  }
}

function logout() {
  sessionStorage.removeItem(AUTH_KEY);
  render();
}

function openModal() {
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-modal').classList.add('open');
  setTimeout(() => document.getElementById('login-user').focus(), 50);
}

function closeModal() {
  document.getElementById('login-modal').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('login-modal')) closeModal();
}

function resetAll() {
  if (!isLoggedIn()) return;
  if (!confirm('Reset all eliminations? This cannot be undone.')) return;
  eliminated = {}; confettiFired = false;
  saveState(eliminated); render();
}

/* ================================================
   RENDER
   ================================================ */
function render() {
  const grid    = document.getElementById('grid');
  const stats   = document.getElementById('stats');
  const cr      = document.getElementById('controls-right');
  const banner  = document.getElementById('winner-banner');
  const winText = document.getElementById('winner-text');
  grid.innerHTML = '';

  let playersIn = 0, teamsLeft = 0, lastWinner = null;

  PLAYERS.forEach((player, pi) => {
    const teams  = ASSIGNMENTS[pi];
    const allOut = teams.every((t,ti) => isElim(pi,ti) || liveTeams.has(t.name));
    if (!allOut) { playersIn++; lastWinner = player; }
    teams.forEach((t,ti) => { if (!isElim(pi,ti) && !liveTeams.has(t.name)) teamsLeft++; });

    const [accent, hbg] = ACCENTS[pi % ACCENTS.length];

    const teamsHTML = teams.map((team,ti) => {
      const isLive   = liveTeams.has(team.name);
      const isManual = isElim(pi,ti);

      if (isLive) {
        // Auto-eliminated — not clickable
        return `<button class="team-btn live-out" disabled title="Knocked out (live data)">
          <span class="flag">${team.flag}</span>
          <span class="team-name">${team.name}</span>
          <span class="live-badge">OUT</span>
        </button>`;
      } else if (isManual) {
        return `<button class="team-btn elim"
                  onclick="toggleTeam(${pi},${ti})"
                  title="Manually eliminated — click to restore">
          <span class="flag">${team.flag}</span>
          <span class="team-name">${team.name}</span>
          <span class="elim-icon">❌</span>
        </button>`;
      } else {
        return `<button class="team-btn"
                  onclick="toggleTeam(${pi},${ti})"
                  title="Click to eliminate">
          <span class="flag">${team.flag}</span>
          <span class="team-name">${team.name}</span>
          <span class="elim-icon">✅</span>
        </button>`;
      }
    }).join('');

    const card = document.createElement('div');
    card.className = 'card' + (allOut?' all-out':'');
    card.innerHTML = `
      <div class="card-inner" style="--accent:${accent};--header-bg:${hbg}">
        <div class="card-header" style="background:${allOut?'#efefef':hbg}">
          <span class="player-emoji">${player.emoji}</span>
          <div class="player-info">
            <div class="player-name">${player.name}</div>
            <div class="player-status ${allOut?'status-out':'status-in'}">
              ${allOut?'💀 Eliminated':'🟢 Still In'}
            </div>
          </div>
        </div>
        <div class="card-teams">${teamsHTML}</div>
      </div>`;
    grid.appendChild(card);
  });

  /* Stats */
  stats.innerHTML = `
    <span class="stat-pill stat-in">🟢 ${playersIn} still in</span>
    <span class="stat-pill stat-out">💀 ${PLAYERS.length-playersIn} out</span>
    <span class="stat-pill stat-teams">⚽ ${teamsLeft} teams left</span>`;

  /* Controls right — admin-aware */
  if (isLoggedIn()) {
    cr.innerHTML = `
      <span class="admin-badge">🔓 Dan Stead</span>
      <button class="btn btn-reset" onclick="resetAll()">↺ Reset All</button>
      <button class="btn btn-logout" onclick="logout()">Logout</button>`;
  } else {
    cr.innerHTML = `<button class="btn btn-login" onclick="openModal()">🔐 Admin</button>`;
  }

  /* Winner */
  if (playersIn === 1) {
    banner.style.display = 'block';
    banner.style.background = 'linear-gradient(135deg,#b8860b 0%,#FFD700 45%,#FFA000 100%)';
    banner.style.animation  = '';
    winText.style.color = '#3a2000';
    winText.textContent = `${lastWinner.emoji}  ${lastWinner.name} WINS THE SWEEPSTAKE!  ${lastWinner.emoji}`;
    if (!confettiFired) { confettiFired = true; launchConfetti(); }
  } else if (playersIn === 0) {
    banner.style.display = 'block';
    banner.style.background = '#333';
    banner.style.animation  = 'none';
    winText.style.color = '#aaa';
    winText.textContent = 'Every team eliminated! 😱';
  } else {
    banner.style.display = 'none';
  }
}

/* ================================================
   CONFETTI
   ================================================ */
function launchConfetti() {
  const palette = ['#FFD700','#FF3B30','#34C759','#007AFF','#FF9500','#AF52DE','#FF2D55','#5AC8FA','#fff'];
  for (let i = 0; i < 120; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      const sz = 7 + Math.random()*9;
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        width:${sz}px; height:${sz*(Math.random()>.5?1:2.4)}px;
        background:${palette[Math.floor(Math.random()*palette.length)]};
        border-radius:${Math.random()>.6?'50%':'1px'};
        animation-duration:${2.8+Math.random()*3.5}s;
        animation-delay:${Math.random()*2.5}s;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 9000);
    }, i * 35);
  }
}

/* ================================================
   LIVE DATA  (ESPN unofficial API — no key required)
   Group stage eliminations are hardcoded as fallback.
   ================================================ */
const LIVE_KEY = 'col_wc2026_live2';
const LIVE_TTL = 15 * 60 * 1000; // re-use cached data for 15 mins

// Hardcoded group stage eliminations (all 16, final as of Jun 27)
const GROUP_STAGE_OUT = new Set([
  'Haiti', 'Turkey', 'Tunisia', 'Jordan',
  'Qatar', 'Curaçao', 'Scotland', 'Iran',
  'Uzbekistan', 'New Zealand', 'South Korea', 'Czechia',
  'Saudi Arabia', 'Iraq', 'Uruguay', 'Panama',
]);

let liveTeams = new Set();       // team names knocked out (server or fallback)
let liveLastTs = 0;
let liveStatus = 'waiting';      // 'waiting' | 'ok' | 'error'

function loadLiveCache() {
  try {
    const s = JSON.parse(localStorage.getItem(LIVE_KEY) || 'null');
    if (s && Date.now() - s.ts < LIVE_TTL) {
      liveTeams  = new Set(s.teams);
      liveLastTs = s.ts;
      liveStatus = 'ok';
    }
  } catch {}
}

function saveLiveCache() {
  try {
    localStorage.setItem(LIVE_KEY, JSON.stringify({ teams: [...liveTeams], ts: liveLastTs }));
  } catch {}
}

function updateLiveBar() {
  const dot  = document.getElementById('live-dot');
  const text = document.getElementById('live-bar-text');
  if (!dot || !text) return;

  dot.className = 'live-dot';

  if (liveStatus === 'ok') {
    dot.classList.add('active');
    const ago = Math.round((Date.now() - liveLastTs) / 60000);
    const agoStr = ago < 1 ? 'just now' : `${ago} min${ago > 1 ? 's' : ''} ago`;
    text.textContent = `Live results · updated ${agoStr} · ${liveTeams.size} team${liveTeams.size !== 1 ? 's' : ''} knocked out`;
  } else if (liveStatus === 'error') {
    dot.classList.add('error');
    text.textContent = 'Live results: could not connect — showing last known data';
  } else {
    dot.classList.add('waiting');
    text.textContent = 'Live results: connecting…';
  }
}

async function fetchLiveData() {
  try {
    const res  = await fetch('/api/eliminated');
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();
    liveTeams  = new Set(data.teams || []);
    liveLastTs = data.lastUpdated || Date.now();
    liveStatus = 'ok';
    saveLiveCache();
  } catch {
    // Fallback: use hardcoded group stage eliminations
    // (happens when viewing as a local file, or if server is down)
    if (liveTeams.size === 0) {
      liveTeams  = new Set(GROUP_STAGE_OUT);
      liveLastTs = Date.now();
      liveStatus = 'ok';
      saveLiveCache();
    } else {
      liveStatus = 'error';
    }
  }
  updateLiveBar();
  render();
}

// Update the bar text every minute without refetching
setInterval(updateLiveBar, 60 * 1000);
// Refetch every 5 minutes
setInterval(fetchLiveData, 5 * 60 * 1000);

/* ================================================
   INIT
   ================================================ */
loadLiveCache();
render();
updateLiveBar();
fetchLiveData(); // kick off first fetch immediately
</script>
